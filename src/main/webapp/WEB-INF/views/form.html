<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Attraction Form</title>
    <style>
        .container { width: 400px; margin: auto; border: 1px solid #ccc; padding: 20px; margin-top: 20px;}
        .error { color: red; font-size: 13px; }
        .field { margin-bottom: 10px; }
        label { display: block; font-weight: bold; }
        input { width: 100%; padding: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">Attraction Form</h2>
    <form th:action="@{/attraction/save}" th:object="${attraction}" method="post" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{coverImage}">

        <div class="field">
            <label>Tên địa danh:</label>
            <input type="text" th:field="*{name}">
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="field">
            <label>Tỉnh/Thành phố:</label>
            <input type="text" th:field="*{location}">
            <div class="error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
        </div>

        <div class="field">
            <label>Mô tả:</label>
            <input type="text" th:field="*{description}">
        </div>

        <div class="field">
            <label>Điểm đánh giá (1 - 5):</label>
            <input type="number" step="1" th:field="*{rating}">
            <div class="error" th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></div>
        </div>

        <div class="field">
            <label>Hình ảnh mới:</label>
            <input type="file" name="imageFile">
            <p th:if="*{coverImage}" style="font-size: 12px; color: gray;">Ảnh hiện tại: [[*{coverImage}]]</p>
        </div>

        <div style="text-align: center; margin-top: 15px;">
            <button type="submit">Xác nhận</button>
            <a th:href="@{/attraction/list}"><button type="button">Hủy</button></a>
        </div>
    </form>
</div>

</body>
</html>
